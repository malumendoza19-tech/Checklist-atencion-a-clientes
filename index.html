<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Troubleshooting | ALTÁN Movilidad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Encode+Sans:wght@300;400;500;600;700&family=Verdana&display=swap');

  /* =============================================
     PALETA OFICIAL ALTÁN REDES — Manual v5
     Primario:   #9E1D23  (rojo ALTÁN)
     Secundario: #ABA5A8  (gris medio)
     Adyacente:  #DBDBDB  (gris claro)
     Negro:      #1A1A1A  (textos oscuros)
     Blanco:     #FFFFFF
     ============================================= */

  :root {
    --altan-red:      #9E1D23;
    --altan-red-dark: #7a1519;
    --altan-red-light:#c4262e;
    --altan-grey:     #ABA5A8;
    --altan-grey-lt:  #DBDBDB;
    --altan-grey-dk:  #8B8B8B;
    --altan-white:    #FFFFFF;
    --altan-black:    #1A1A1A;

    /* Mapeados funcionales */
    --bg:         #F5F4F4;
    --surface:    #FFFFFF;
    --surface2:   #F0EEEE;
    --surface3:   #E8E5E5;
    --accent:     #9E1D23;
    --accent2:    #7a1519;
    --accent3:    #2E7D32;
    --danger:     #9E1D23;
    --warning:    #B8621A;
    --text:       #1A1A1A;
    --text-muted: #6B6568;
    --border:     rgba(158,29,35,0.18);
    --border-lt:  rgba(158,29,35,0.08);
    --shadow:     0 2px 16px rgba(158,29,35,0.10);
    --shadow-lg:  0 4px 32px rgba(158,29,35,0.14);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Encode Sans', Verdana, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Fondo sutil con patrón de líneas diagonal ALTÁN */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      repeating-linear-gradient(
        135deg,
        transparent,
        transparent 60px,
        rgba(158,29,35,0.025) 60px,
        rgba(158,29,35,0.025) 61px
      );
    pointer-events:none;
    z-index:0;
  }

  .app { position:relative; z-index:1; }

  /* ─── HEADER ─── */
  header {
    background: var(--altan-red);
    border-bottom: 4px solid var(--altan-red-dark);
    padding: 0 24px;
    display: flex;
    align-items: stretch;
    gap: 0;
    box-shadow: 0 4px 20px rgba(158,29,35,0.35);
    height: 68px;
  }

  /* Franja izquierda decorativa */
  .header-brand {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-right: 24px;
    border-right: 1px solid rgba(255,255,255,0.2);
    margin-right: 20px;
  }

  /* Logo ALTÁN texto simulado */
  .logo-altan {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .logo-altan .logo-name {
    font-family: Verdana, sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .logo-altan .logo-sub {
    font-family: 'Encode Sans', sans-serif;
    font-size: 9px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Líneas decorativas del logo ALTÁN */
  .logo-lines {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-right: 2px;
  }
  .logo-line { height: 2px; background: #FFFFFF; }
  .logo-line:nth-child(1) { width: 28px; }
  .logo-line:nth-child(2) { width: 28px; }

  header h1 {
    font-family: 'Encode Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #FFFFFF;
    letter-spacing: 0.2px;
  }

  header p {
    font-size: 11px;
    color: rgba(255,255,255,0.70);
    margin-top: 2px;
    font-weight: 300;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .status-pill {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.35);
    color: #FFFFFF;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* ─── LAYOUT ─── */
  .main {
    display: grid;
    grid-template-columns: 272px 1fr;
    min-height: calc(100vh - 68px);
  }

  /* ─── SIDEBAR ─── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--altan-grey-lt);
    padding: 20px 14px;
    overflow-y: auto;
    box-shadow: 2px 0 8px rgba(0,0,0,0.04);
  }

  /* Banda roja lateral */
  aside::before {
    content:'';
    display:block;
    height: 3px;
    background: var(--altan-red);
    margin: -20px -14px 16px -14px;
    border-bottom: 1px solid var(--altan-red-dark);
  }

  .sidebar-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--altan-red);
    text-transform: uppercase;
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .category-btn {
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-muted);
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Encode Sans', Verdana, sans-serif;
    font-size: 12.5px;
    font-weight: 400;
    text-align: left;
    transition: all 0.18s;
    margin-bottom: 2px;
  }

  .category-btn:hover {
    background: var(--surface2);
    border-color: var(--altan-grey-lt);
    color: var(--text);
  }

  .category-btn.active {
    background: rgba(158,29,35,0.06);
    border-color: var(--altan-red);
    color: var(--altan-red);
    font-weight: 600;
  }

  .cat-icon {
    width: 30px; height: 30px;
    background: var(--surface2);
    border-radius: 7px;
    display: flex; align-items:center; justify-content:center;
    font-size: 14px;
    flex-shrink: 0;
    border: 1px solid var(--altan-grey-lt);
  }

  .category-btn.active .cat-icon {
    background: rgba(158,29,35,0.08);
    border-color: rgba(158,29,35,0.25);
  }

  .divider {
    border: none;
    border-top: 1px solid var(--altan-grey-lt);
    margin: 12px 0;
  }

  .info-card {
    background: rgba(158,29,35,0.04);
    border: 1px solid rgba(158,29,35,0.15);
    border-left: 3px solid var(--altan-red);
    border-radius: 0 8px 8px 0;
    padding: 10px 12px;
    font-size: 11.5px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .info-card strong { color: var(--altan-red); }

  /* ─── CONTENT ─── */
  .content {
    padding: 28px;
    overflow-y: auto;
    max-height: calc(100vh - 68px);
    background: var(--bg);
  }

  /* ─── WELCOME ─── */
  .welcome {
    max-width: 700px;
    margin: 32px auto;
    text-align: center;
  }

  .welcome-icon {
    width: 80px; height: 80px;
    background: var(--altan-red);
    border-radius: 20px;
    display: flex; align-items:center; justify-content:center;
    font-size: 36px;
    margin: 0 auto 24px;
    box-shadow: var(--shadow-lg);
    position: relative;
  }

  .welcome-icon::after {
    content:'';
    position:absolute;
    inset:-3px;
    border-radius: 23px;
    border: 2px solid rgba(158,29,35,0.3);
  }

  .welcome h2 {
    font-family: Verdana, sans-serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--altan-red);
    letter-spacing: -0.3px;
  }

  .welcome p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 32px;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }

  .quick-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .quick-card {
    background: var(--surface);
    border: 1px solid var(--altan-grey-lt);
    border-top: 3px solid var(--altan-red);
    border-radius: 10px;
    padding: 18px 12px 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .quick-card:hover {
    border-color: var(--altan-red);
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
  }

  .quick-card .qi { font-size: 26px; margin-bottom: 8px; }
  .quick-card .ql { font-size: 12px; font-weight: 700; color: var(--text); }
  .quick-card .qd { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* ─── TREE ─── */
  .tree-container { max-width: 720px; }

  .tree-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--altan-grey-lt);
  }

  .tree-header-icon {
    width: 50px; height: 50px;
    background: var(--altan-red);
    border-radius: 12px;
    display: flex; align-items:center; justify-content:center;
    font-size: 24px;
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }

  .tree-header h2 {
    font-family: Verdana, sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--altan-red);
  }

  .tree-header p { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  /* ─── BREADCRUMB ─── */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .breadcrumb span { color: var(--altan-red); font-weight: 600; }
  .breadcrumb .sep { opacity: 0.4; }

  /* ─── STEP CARD ─── */
  .step-card {
    background: var(--surface);
    border: 1px solid var(--altan-grey-lt);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
    animation: slideIn 0.25s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border-left: 4px solid var(--altan-red);
  }

  @keyframes slideIn {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }

  .step-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(158,29,35,0.07);
    border: 1px solid rgba(158,29,35,0.2);
    color: var(--altan-red);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .step-question {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    margin-bottom: 8px;
    color: var(--text);
    font-family: Verdana, sans-serif;
  }

  .step-note {
    font-size: 12px;
    color: var(--text-muted);
    background: rgba(171,165,168,0.12);
    border-left: 3px solid var(--altan-grey);
    padding: 8px 12px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 16px;
    line-height: 1.6;
  }

  /* ─── DIAGNOSTIC PROMPT ─── */
  .diag-prompt {
    background: rgba(158,29,35,0.03);
    border: 1px solid rgba(158,29,35,0.15);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .diag-prompt h4 {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--altan-red);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .diag-question {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    font-size: 13px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--altan-grey-lt);
  }

  .diag-question:last-child { border-bottom: none; }
  .diag-q-icon { color: var(--altan-red); flex-shrink: 0; margin-top: 1px; }

  /* ─── INTERACTIVE DIAGNOSTIC CARDS ─── */
  .diag-question-card {
    border: 1px solid transparent;
    border-radius: 8px;
    margin-bottom: 4px;
    transition: border-color 0.18s;
    overflow: hidden;
  }

  .diag-q-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 7px;
  }

  .diag-q-row:hover { background: rgba(158,29,35,0.04); }

  .diag-q-num {
    width: 24px; height: 24px;
    background: var(--altan-red);
    border-radius: 50%;
    display: flex; align-items:center; justify-content:center;
    font-size: 11px;
    font-weight: 700;
    color: #FFFFFF;
    flex-shrink: 0;
  }

  .diag-q-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }

  .diag-q-arrow {
    color: var(--altan-grey);
    font-size: 16px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .diag-q-tip {
    padding: 8px 12px 10px 46px;
    font-size: 12px;
    color: var(--altan-red-dark);
    background: rgba(158,29,35,0.05);
    border-top: 1px solid rgba(158,29,35,0.1);
    line-height: 1.6;
  }

  /* ─── YES/NO BUTTONS ─── */
  .answer-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }

  .btn-yes, .btn-no {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 8px;
    font-family: 'Encode Sans', Verdana, sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.3px;
  }

  .btn-yes {
    background: #2E7D32;
    border: none;
    color: #FFFFFF;
  }

  .btn-yes:hover {
    background: #1B5E20;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(46,125,50,0.3);
  }

  .btn-no {
    background: var(--altan-red);
    border: none;
    color: #FFFFFF;
  }

  .btn-no:hover {
    background: var(--altan-red-dark);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(158,29,35,0.3);
  }

  /* ─── SOLUTION CARD ─── */
  .solution-card {
    background: #F1F8F1;
    border: 1px solid #A5D6A7;
    border-left: 4px solid #2E7D32;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
    animation: slideIn 0.25s ease;
  }

  .solution-card h3 {
    font-size: 12px;
    font-weight: 700;
    color: #2E7D32;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .solution-card p {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .solution-card .note-tag {
    display: inline-block;
    background: rgba(184,98,26,0.08);
    border: 1px solid rgba(184,98,26,0.3);
    color: var(--warning);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    margin-top: 8px;
  }

  /* ─── TICKET CARD ─── */
  .ticket-card {
    background: rgba(158,29,35,0.04);
    border: 1px solid rgba(158,29,35,0.2);
    border-left: 4px solid var(--altan-red);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .ticket-card h3 {
    font-size: 12px;
    font-weight: 700;
    color: var(--altan-red);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  /* ─── CHECKLIST ─── */
  .checklist-card {
    background: var(--surface);
    border: 1px solid var(--altan-grey-lt);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .checklist-card h3 {
    font-size: 11px;
    font-weight: 700;
    color: var(--altan-red);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--altan-grey-lt);
    padding-bottom: 10px;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--altan-grey-lt);
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 6px;
    padding: 9px 8px;
  }

  .check-item:last-child { border-bottom: none; }
  .check-item:hover { background: var(--surface2); }

  .check-box {
    width: 20px; height: 20px;
    border: 2px solid var(--altan-grey);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items:center; justify-content:center;
    transition: all 0.18s;
    font-size: 12px;
    color: #FFFFFF;
  }

  .check-item.checked .check-box {
    background: var(--altan-red);
    border-color: var(--altan-red);
  }

  .check-item.checked .check-label {
    text-decoration: line-through;
    color: var(--altan-grey);
  }

  .check-label { font-size: 13px; line-height: 1.4; color: var(--text); }

  /* ─── INFOGRAPHIC SECTION ─── */
  .infographic-section {
    background: rgba(171,165,168,0.08);
    border: 1px solid var(--altan-grey-lt);
    border-top: 2px solid var(--altan-red);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .infographic-section h4 {
    font-size: 10px;
    font-weight: 700;
    color: var(--altan-red);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .infographic-link {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--altan-grey-lt);
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: all 0.18s;
    margin-bottom: 6px;
    font-size: 13px;
  }

  .infographic-link:hover {
    border-color: var(--altan-red);
    color: var(--altan-red);
    background: rgba(158,29,35,0.03);
  }

  .infographic-link .link-icon { font-size: 15px; }

  /* ─── SECCIÓN GUÍA GENIALLY ─── */
  .infog-desc {
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .infog-main-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--altan-red);
    border-radius: 10px;
    padding: 16px 20px;
    text-decoration: none;
    color: #FFFFFF;
    transition: all 0.2s;
    margin-bottom: 14px;
    box-shadow: 0 3px 14px rgba(158,29,35,0.3);
  }

  .infog-main-btn:hover {
    background: var(--altan-red-dark);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(158,29,35,0.4);
  }

  .infog-btn-icon {
    font-size: 28px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.15);
    width: 48px; height: 48px;
    border-radius: 10px;
    display: flex; align-items:center; justify-content:center;
  }

  .infog-btn-text {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex: 1;
  }

  .infog-btn-title {
    font-size: 14px;
    font-weight: 700;
    font-family: Verdana, sans-serif;
    letter-spacing: 0.2px;
  }

  .infog-btn-sub {
    font-size: 11px;
    opacity: 0.8;
    font-weight: 300;
  }

  .infog-btn-arrow {
    font-size: 20px;
    opacity: 0.8;
    flex-shrink: 0;
  }

  /* Tags de temas disponibles */
  .infog-topics {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }

  .infog-topic-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    width: 100%;
    margin-bottom: 2px;
  }

  .infog-tag {
    background: rgba(158,29,35,0.07);
    border: 1px solid rgba(158,29,35,0.18);
    color: var(--altan-red);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* ─── NAV BUTTONS ─── */
  .nav-row {
    display: flex;
    gap: 10px;

function selectCategory(cat) {
  // Update sidebar active
  document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + cat);
  if (btn) btn.classList.add('active');

  currentCategory = cat;
  currentStep = 0;
  history = [];
  checkedItems = {};

  if (cat === 'welcome') { renderWelcome(); return; }
  if (cat === 'recargas') { renderRecargas(); return; }
  if (cat === 'portabilidad') { renderPortabilidad(); return; }
  if (cat === 'a2p') { renderA2P(); return; }

  const data = categories[cat];
  if (!data) { renderWelcome(); return; }

  renderDiagnostic(data);
}

function toggleDiagTip(i) {
  const tip = document.getElementById('dq-tip-' + i);
  const arrow = document.getElementById('dq-arrow-' + i);
  const card = document.getElementById('dq-' + i);
  if (!tip) return;
  const visible = tip.style.display !== 'none';
  tip.style.display = visible ? 'none' : 'block';
  arrow.style.transform = visible ? 'rotate(0deg)' : 'rotate(90deg)';
  card.style.borderColor = visible ? 'transparent' : 'rgba(158,29,35,0.3)';
}


function startTree() {
  currentStep = 0;
  history = [];
  renderStep();
}

function renderStep() {
  const data = categories[currentCategory];
  if (!data || currentStep >= data.steps.length) return;

  const step = data.steps[currentStep];
  const total = data.steps.length;
  const pct = Math.round((currentStep / total) * 100);

  const breadcrumbHtml = history.length > 0
    ? `<div class="breadcrumb">
        ${history.map((h,i) => `<span>Paso ${h.paso}</span><span class="sep">›</span>`).join('')}
        <span>Paso ${step.paso}</span>
       </div>`
    : '';

  const levelClass = step.nivel === 'N1' ? 'level-n1' : 'level-n2';
  const levelLabel = step.nivel === 'N1' ? '📞 Nivel 1 — Front Office' : '🔧 Nivel 2 — Back Office';

  document.getElementById('content').innerHTML = `
    <div class="tree-container">
      <div class="tree-header">
        <div class="tree-header-icon">${data.icon}</div>
        <div>
          <h2>${data.label}</h2>
          <p>Troubleshooting Guiado — ALTÁN Movilidad</p>
        </div>
      </div>

      <div class="progress-bar-wrap">
        <div class="progress-label">
          <span>Progreso</span>
          <span>Paso ${step.paso} de ${total}</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
      </div>

      ${breadcrumbHtml}

      <div class="level-badge ${levelClass}">${levelLabel}</div>

      <div class="step-card">
        <div class="step-badge">✦ Paso ${step.paso}</div>
        <div class="step-question">${step.accion}</div>
        ${step.nota ? `<div class="step-note">📌 ${step.nota}</div>` : ''}

        <div style="margin-top:16px;margin-bottom:8px;font-size:13px;font-weight:600;color:var(--text-muted);">${step.validacion}</div>

        <div class="answer-row">
          <button class="btn-yes" onclick="answerStep(true)">
            ✅ SÍ
          </button>
          <button class="btn-no" onclick="answerStep(false)">
            ❌ NO
          </button>
        </div>
      </div>

      <div class="nav-row">
        <button class="btn-back" onclick="goBack()">← Atrás</button>
        <button class="btn-back" onclick="selectCategory('${currentCategory}')">🔄 Reiniciar</button>
      </div>
    </div>
  `;
}

function answerStep(yes) {
  const data = categories[currentCategory];
  const step = data.steps[currentStep];
  const answer = yes ? step.si : step.no;

  history.push({ paso: step.paso, answer: yes });

  // Check if answer is a "Paso N" reference or a solution
  const nextStepMatch = answer.match(/^Paso (\d+)/);
  if (nextStepMatch) {
    const nextPasoNum = parseInt(nextStepMatch[1]);
    const nextIdx = data.steps.findIndex(s => s.paso === nextPasoNum);
    if (nextIdx !== -1) {
      currentStep = nextIdx;
      renderStep();
      return;
    }
  }

  // Check if it contains "Generar Ticket"
  const isTicket = answer.toLowerCase().includes('generar ticket') || answer.toLowerCase().includes('escalar');

  // It's a solution - render it
  renderSolution(step, answer, isTicket, yes);
}

        </div>

  ` : '';

  // Build infographics — single Genially landing page
  const infographicsHtml = data.infographics && data.infographics.length > 0 ? `

      <a href="https://view.genially.com/67e22998b61f4755a1db0cc7" class="infog-main-btn" target="_blank">

        <div class="infog-btn-text">

  ` : '';

  const cardClass = isTicket ? 'ticket-card' : 'solution-card';

  document.getElementById('content').innerHTML = `

      </div>
    </div>
  `;
}

function toggleCheck(idx, el) {
  checkedItems[idx] = !checkedItems[idx];
  el.classList.toggle('checked', checkedItems[idx]);
  el.querySelector('.check-box').textContent = checkedItems[idx] ? '✓' : '';
}

function goBack() {
  if (history.length === 0) {
    selectCategory(currentCategory);
    return;
  }
  history.pop();
  if (history.length === 0) {
    startTree();
    return;
  }
  const lastPaso = history[history.length - 1].paso;
  const data = categories[currentCategory];
  const idx = data.steps.findIndex(s => s.paso === lastPaso);
  currentStep = idx !== -1 ? idx : 0;
  renderStep();
}
